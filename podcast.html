<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast | Coming Soon</title>
    <style>
        :root {
            /* 🟢 REFINED GREEN THEME */
            --bg-base: #020604; 
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glass-bg: rgba(5, 15, 8, 0.6);
            --glass-border: rgba(0, 255, 128, 0.1);
            --neon-green: #00ff66;
            --dark-green: #004d26;
        }

        /* Anti-Flicker & Mobile Glitch Fix */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-base);
            overflow: hidden;
            position: relative;
            padding: 2rem 1rem;
        }

        /* =========================================
           AMBIENT BACKGROUND ORBS
           ========================================= */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: floatOrbX 15s infinite ease-in-out alternate, floatOrbY 20s infinite ease-in-out alternate;
            /* Prevents weird white blowouts on mobile */
            mix-blend-mode: screen; 
            pointer-events: none;
        }
        
        .orb-1 { width: 350px; height: 350px; background: rgba(0, 255, 106, 0.15); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: rgba(29, 185, 84, 0.15); bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes floatOrbX {
            0% { transform: translateX(0); }
            100% { transform: translateX(40px) scale(1.1); }
        }
        @keyframes floatOrbY {
            0% { transform: translateY(0); }
            100% { transform: translateY(30px) scale(0.95); }
        }

        /* =========================================
           MAIN CONTAINER
           ========================================= */
        .container {
            text-align: center;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
            max-width: 480px;
            width: 100%;
            
            /* Stabilizes rendering on iOS/Safari */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            
            /* Entrance Animation */
            opacity: 0;
            animation: springUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* =========================================
           ANIMATED COVER ART (MYSTERY TEASER)
           ========================================= */
        .cover-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 2.5rem auto;
            animation: floatCover 6s ease-in-out infinite;
            border-radius: 20px;
            /* Fixes the blur bleeding past the borders */
            overflow: hidden; 
            border: 1px solid rgba(0, 255, 128, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            background-color: #000;
            
            /* Hardware acceleration for mobile */
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        /* The glowing shadow behind the cover (Moved outside wrapper to prevent clipping) */
        .cover-glow-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 2.5rem auto;
        }

        .cover-glow {
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: linear-gradient(135deg, var(--neon-green), var(--dark-green));
            filter: blur(25px);
            opacity: 0.4;
            z-index: 1;
            border-radius: 24px;
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        /* Safe Dark Mask (Better than just contrast/brightness filters on mobile) */
        .cover-dark-mask {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 15, 5, 0.65);
            z-index: 2;
        }

        /* Question mark overlay */
        .mystery-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            font-size: 5rem;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 30px rgba(0, 255, 102, 0.4);
            pointer-events: none;
        }

        /* The image */
        .cover-image {
            position: absolute;
            top: -10%; left: -10%;
            width: 120%;
            height: 120%;
            object-fit: cover;
            /* Reduced blur to prevent white edge artifacts, mask handles the darkness */
            filter: blur(10px) grayscale(50%);
            z-index: 1;
        }

        /* =========================================
           TYPOGRAPHY & BUTTONS
           ========================================= */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            color: #ffffff;
        }

        p {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .back-btn {
            display: inline-block;
            padding: 0.9rem 2.5rem;
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid rgba(29, 185, 84, 0.4);
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(29, 185, 84, 0.25);
            border-color: rgba(29, 185, 84, 0.8);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(29, 185, 84, 0.2);
        }

        /* =========================================
           KEYFRAMES
           ========================================= */
        @keyframes springUp { 
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }
        @keyframes pulseGlow { 
            0% { opacity: 0.3; transform: scale(0.95); } 
            100% { opacity: 0.6; transform: scale(1.05); } 
        }
        @keyframes floatCover {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1.5deg); }
        }

    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="container">
        
        <div class="cover-glow-container">
            <div class="cover-glow"></div>
            <div class="cover-wrapper">
                <div class="cover-dark-mask"></div>
                
                <div class="mystery-overlay">?</div>
                
                <img src="2_mit_Hertz_v8.5.png" alt="Secret Podcast Project" class="cover-image">
            </div>
        </div>
        
        <h1>GEHEIM!</h1>
        <p>Jaaa, es ist ein Podcast geplant, wie / wo / wer / wieso? KOMMT ALLES NOCH!</p>
        
        <a href="index.html" class="back-btn">← Back to Links</a>
    </div>

</body>
</html>
