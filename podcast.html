<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast | Coming Soon</title>
    <style>
        :root {
            /* 🟢 GREEN THEME COLORS */
            --bg-base: #030a06; 
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --glass-bg: rgba(10, 25, 15, 0.45);
            --glass-border: rgba(0, 255, 128, 0.15);
            --neon-green: #00ff66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-base);
            overflow: hidden;
            position: relative;
            padding: 2rem 1rem;
        }

        /* =========================================
           AMBIENT BACKGROUND ORBS
           ========================================= */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.5;
            z-index: 0;
            animation: floatOrbX 15s infinite ease-in-out alternate, floatOrbY 20s infinite ease-in-out alternate;
        }
        
        .orb-1 { width: 400px; height: 400px; background: rgba(0, 255, 106, 0.2); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(29, 185, 84, 0.25); bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes floatOrbX {
            0% { transform: translateX(0); }
            100% { transform: translateX(50px) scale(1.1); }
        }
        @keyframes floatOrbY {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px) scale(0.9); }
        }

        /* =========================================
           MAIN CONTAINER
           ========================================= */
        .container {
            text-align: center;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            
            /* Entrance Animation */
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: springUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* =========================================
           ANIMATED COVER ART (MYSTERY TEASER)
           ========================================= */
        .cover-wrapper {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 2.5rem auto;
            animation: floatCover 6s ease-in-out infinite;
            border-radius: 20px;
            overflow: hidden; /* Keeps the blurred edges clean */
            border: 2px solid rgba(0, 255, 128, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        /* The glowing shadow behind the cover */
        .cover-glow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--neon-green), #009955);
            filter: blur(20px);
            opacity: 0.6;
            z-index: 1;
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        /* Question mark overlay to emphasize the mystery */
        .mystery-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            font-size: 5rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 20px rgba(0, 255, 128, 0.8);
            pointer-events: none;
        }

        /* The image - Heavily blurred to hide the name */
        .cover-image {
            position: relative;
            z-index: 2;
            width: 110%; /* Slightly larger to hide blurry edges */
            height: 110%;
            margin: -5%; /* Centers the slightly larger image */
            object-fit: cover;
            filter: blur(15px) brightness(0.6) contrast(1.2); /* The Secret Blur */
            background-color: #111; 
        }

        /* =========================================
           TYPOGRAPHY & BUTTONS
           ========================================= */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(29, 185, 84, 0.5);
        }

        p {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .back-btn {
            display: inline-block;
            padding: 0.9rem 2.5rem;
            background: rgba(29, 185, 84, 0.15);
            border: 1px solid rgba(29, 185, 84, 0.5);
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .back-btn:hover {
            background: rgba(29, 185, 84, 0.3);
            border-color: rgba(29, 185, 84, 0.9);
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 20px rgba(29, 185, 84, 0.25);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* =========================================
           KEYFRAMES
           ========================================= */
        @keyframes springUp { to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pulseGlow { 0% { opacity: 0.4; transform: scale(0.95); } 100% { opacity: 0.8; transform: scale(1.05); } }
        @keyframes floatCover {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

/* Verhindert das Flackern durch GPU-Rendering */
* {
    /* Stabilisiert die Ebenen */
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    
    /* Verhindert, dass der Browser bei Skalierungen "zappelt" */
    -webkit-perspective: 1000;
    perspective: 1000;
}

/* Speziell für Elemente mit Blur-Effekt */
.link-card {
    /* Verhindert das Flackern bei backdrop-filter */
    -webkit-transform: translate3d(0, 0, 0);
    transform: translate3d(0, 0, 0);
}

@media (max-width: 800px) {
    /* 1. Hintergrund-Animation stoppen, da sie oft Flackern auslöst */
    body {
        animation: none !important;
        background: var(--bg-deep) !important; /* Statische Farbe */
    }

    /* 2. Den Hintergrund-Staub (Dust) komplett ausblenden */
    body::before {
        display: none !important;
    }

    /* 3. Orbs statisch machen (Animation stoppen) */
    .ambient-orb {
        animation: none !important;
        opacity: 0.3; /* Nur ganz leicht sichtbar */
    }
}
    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="container">
        
        <!-- MYSTERY COVER SECTION -->
        <div class="cover-wrapper">
            <div class="cover-glow"></div>
            
            <!-- Floating Question Mark Overlay -->
            <div class="mystery-overlay">?</div>
            
            <!-- Image loaded but blurred via CSS -->
            <img src="2_mit_Hertz_v8.5.png" alt="Secret Podcast Project" class="cover-image">
        </div>
        
        <h1>GEHEIM!</h1>
        <p>Jaaa, es ist ein Podcast geplant, wie / wo / wer / wieso? KOMMT ALLES NOCH!</p>
        
        <a href="index.html" class="back-btn">← Back to Links</a>
    </div>

</body>
</html>
